<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Turing's Mirror — Are You Smarter Than the Test?</title>
  <style>
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      min-height: 100vh;
      transition: background 0.5s;
    }
    h1 { margin-bottom: 0.2rem; }
    .message-card {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1rem 0;
      max-width: 600px;
      width: 100%;
    }
    .btn-human {
      background: #f0c040;
      color: #000;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      margin: 0.5rem;
    }
    .btn-ai {
      background: #4040f0;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      margin: 0.5rem;
    }
    .score { font-size: 2rem; margin: 1rem 0; color: #f0c040; }
    .round-label { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
    .result-correct { color: #40f040; }
    .result-wrong { color: #f04040; }
    body.enlightened { background: #fffdf0; color: #111; }
  </style>
</head>
<body>
  <h1>🪞 Turing's Mirror</h1>
  <p class="round-label">Can you tell the human from the machine?</p>
  <div id="game-container"></div>
  <script src="game.js"></script>
</body>
</html>
